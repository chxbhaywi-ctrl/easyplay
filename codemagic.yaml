workflows:
  android-apk:
    name: Android APK Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - node_modules

    scripts:
      - name: Install dependencies
        script: |
          # 🟢 สเต็ปเด็ด: ใช้คำสั่ง node ถอดค่า packageManager ออกจาก package.json ทันทีเพื่อไม่ให้ระบบบล็อก
          node -e "let fs = require('fs'); let p = JSON.parse(fs.readFileSync('package.json', 'utf8')); delete p.packageManager; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"
          
          # เปลี่ยนมาใช้ Yarn คลาสสิกทำงานแบบไม่มีตัวล็อกเวอร์ชันขวางทาง
          corepack disable || true
          npm install -g yarn
          yarn config set ignore-engines true
          yarn install --no-lockfile

      - name: Expo prebuild
        script: |
          yarn expo prebuild --platform android --clean --no-install

      - name: Set yarn worklets path
        script: |
          WORKLETS=$(find node_modules -type d -name "react-native-worklets" | grep -v reanimated | head -1)
          sed -i "s|WORKLETS_PATH_PLACEHOLDER|$WORKLETS|g" android/app/build.gradle || true

      - name: Build release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --quiet

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - chxbhaywi@gmail.com
