workflows:
  android-apk:
    name: Android APK Build
    instance_type: mac_mini_m2   # ฟรี 500 นาที/เดือน
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - $CM_BUILD_DIR/artifacts/sms-forwarder/node_modules

    scripts:
      - name: Install pnpm
        script: npm install -g pnpm

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo prebuild
        script: |
          cd artifacts/sms-forwarder
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Set pnpm worklets path
        script: |
          WORKLETS=$(find artifacts/sms-forwarder/node_modules/.pnpm -type d -name "react-native-worklets" | grep -v reanimated | head -1)
          sed -i "s|WORKLETS_PATH_PLACEHOLDER|$WORKLETS|g" \
            artifacts/sms-forwarder/android/app/build.gradle || true

      - name: Build release APK
        script: |
          cd artifacts/sms-forwarder/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --quiet
        environment:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

    artifacts:
      - artifacts/sms-forwarder/android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - $CM_SUBMITTER_EMAIL
        notify:
          success: true
          failure: true
