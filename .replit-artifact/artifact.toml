kind = "mobile"
previewPath = "/sms-forwarder/"
title = "PayGate SMS Forwarder"
version = "1.0.0"
id = "artifacts/sms-forwarder"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/sms-forwarder/" ]
localPort = 21973

[services.development]
run = "pnpm --filter @workspace/sms-forwarder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sms-forwarder", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sms-forwarder", "run", "serve" ]

[services.env]
PORT = "21973"
BASE_PATH = "/sms-forwarder/"
